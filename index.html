<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIPTS R3 — Full Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #111827; /* Fondo oscuro profesional */
            --card-bg: #ffffff;
            --accent-color: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Eliminamos el scroll del body para que el iframe sea el que mande */
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
        }

        .tabs-container {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa el 100% del alto de la ventana */
            width: 100vw;  /* Ocupa el 100% del ancho de la ventana */
            background: var(--card-bg);
        }

        /* Barra de navegación superior compacta */
        .button-container {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; /* Evita que la barra se encoja */
        }

        input[type="radio"] {
            display: none;
        }

        label {
            padding: 8px 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 6px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        label:hover {
            background: #edf2f7;
            color: var(--text-main);
        }

        /* Estilo activo tipo pestaña de navegador */
        #tab1:checked ~ .button-container label[for="tab1"],
        #tab2:checked ~ .button-container label[for="tab2"],
        #tab3:checked ~ .button-container label[for="tab3"] {
            background: var(--accent-color);
            color: #ffffff;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        /* Área de contenido que ocupa el resto de la pantalla */
        .tab-content {
            flex-grow: 1;
            position: relative;
            width: 100%;
            background: #fff;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* Mostrar iframe activo */
        #tab1:checked ~ .tab-content #content1,
        #tab2:checked ~ .tab-content #content2,
        #tab3:checked ~ .tab-content #content3 {
            display: block;
        }
    </style>
</head>
<body>

    <div class="tabs-container">
        <input type="radio" id="tab1" name="tab" checked>
        <input type="radio" id="tab2" name="tab">
        <input type="radio" id="tab3" name="tab">

        <div class="button-container">
            <label for="tab1">Folio Principal</label>
            <label for="tab2">Folio Secundario</label>
            <label for="tab3">Directorio / Celulares</label>
        </div>

        <div class="tab-content">
            <iframe id="content1" src="tab1.html"></iframe>
            <iframe id="content2" src="tab2.html"></iframe>
            <iframe id="content3" src="tab3.html"></iframe>
        </div>
    </div>

</body>
</html>
