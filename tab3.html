<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SCRIPT 1 — Mobile</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-beta.1/css/select2.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f6f8;
      --bg2: #ffffff;
      --bg3: #eef0f4;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.14);
      --text: #111827;
      --text2: #4b5563;
      --text3: #9ca3af;
      --accent: #2563eb;
      --accent-dim: rgba(37,99,235,0.10);
      --green: #059669;
      --green-dim: rgba(5,150,105,0.10);
      --red: #dc2626;
      --red-dim: rgba(220,38,38,0.10);
      --amber: #d97706;
      --purple: #7c3aed;
      --purple-dim: rgba(124,58,237,0.10);
      --radius: 10px;
      --radius-sm: 6px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --tab-bar-h: 48px;
      --copy-bar-h: 56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      overflow: hidden; /* sin scroll en body, scroll solo en el panel activo */
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 44px;
    }
    .logo { font-family: var(--font-head); font-weight: 700; font-size: 15px; }
    .logo span { color: var(--accent); }
    .status-wrap { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .status-text { color: var(--text3); font-size: 10px; }

    /* ── LAYOUT PRINCIPAL ── */
    .app {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 44px);
      height: calc(100dvh - 44px);
    }

    /* ── BUSCADOR ACORDEÓN ── */
    .buscador-wrap {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .buscador-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      list-style: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .buscador-summary::-webkit-details-marker { display: none; }
    .buscador-summary .chevron {
      font-size: 10px;
      transition: transform 0.2s;
    }
    details[open] .chevron { transform: rotate(180deg); }

    .buscador-body {
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--border);
    }
    .buscador-body input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 15px;
      background: var(--bg3);
      color: var(--text);
      outline: none;
    }
    .buscador-body input:focus { border-color: var(--accent); background: var(--bg2); }

    .row-btns { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border2);
      transition: all 0.15s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-ghost  { background: transparent; color: var(--text2); }
    .btn-save   { background: var(--green-dim); color: var(--green); border-color: var(--green); }

    /* Lista de folios recientes */
    .folios-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 4px;
    }
    .folio-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 12px;
    }
    .folio-chip-id { color: var(--accent); font-weight: 600; cursor: pointer; }
    .folio-chip-del { color: var(--text3); cursor: pointer; font-size: 13px; }
    .folio-chip-del:hover { color: var(--red); }

    /* ── TABS DE SECCIÓN ── */
    .tabs-nav {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: var(--tab-bar-h);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tabs-nav::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 1;
      min-width: 70px;
      padding: 0 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); background: var(--bg); }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-eta   { background: var(--amber); }
    .dot-sitio { background: var(--accent); }
    .dot-fallo { background: var(--red); }
    .dot-final { background: var(--green); }

    /* ── PANEL DE FORMULARIO ── */
      .panels-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #modificar-form {
      height: 100%;
    }
    .tab-panel {
      display: none;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(var(--copy-bar-h) + 16px); /* espacio para la barra de copiar */
    }
    .tab-panel.active { display: block; }

    .section-title {
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .sync-tag {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--green-dim);
      color: var(--green);
    }
    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 16px; /* 16px evita zoom automático en iOS */
      color: var(--text);
      background: var(--bg2);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .field input:focus,
    .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text3); }
    .field input[readonly] { background: var(--bg3); color: var(--text3); }

    /* ── BARRA DE COPIAR (sticky bottom) ── */
    .copy-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--copy-bar-h);
      display: flex;
      gap: 4px;
      padding: 8px 10px;
      background: var(--bg2);
      border-top: 2px solid var(--border2);
      z-index: 1000;
    }
    .copy-bar button {
      flex: 1;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-bar button:active { transform: scale(0.94); }
    .copy-bar .c-eta   { background: var(--amber); }
    .copy-bar .c-sitio { background: var(--accent); }
    .copy-bar .c-fallo { background: var(--red); }
    .copy-bar .c-final { background: var(--green); }
    .copy-bar button.copied { filter: brightness(1.3); }

    /* ── EVIDENCIA FOTOGRÁFICA ── */
    .drop-zone {
      border: 2px dashed var(--border2);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
      color: var(--text3);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg3);
    }
    .drop-zone.dragover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .galeria { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .galeria img {
      width: 72px; height: 72px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    /* ── SELECT2 OVERRIDE ── */
    .select2-container { width: 100% !important; }
    .select2-container--default .select2-selection--single {
      height: 48px !important;
      border: 1px solid var(--border2) !important;
      border-radius: var(--radius-sm) !important;
      display: flex; align-items: center;
    }
    .select2-container--default .select2-selection--single .select2-selection__rendered {
      line-height: 48px !important;
      font-size: 16px !important;
      padding-left: 14px !important;
      padding-right: 30px !important;
      color: var(--text);
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 48px !important; top: 0; right: 8px;
    }
    .select2-results__option { font-size: 14px !important; padding: 12px 14px !important; }
    .select2-container--default .select2-results__option--highlighted {
      background: var(--accent-dim) !important; color: var(--accent) !important;
    }

    /* ── DIVIDER ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #1e293b;
      padding: 14px 28px;
      border-radius: 50px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 10px;
      border-bottom: 4px solid var(--green);
      opacity: 0;
      transition: all 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { top: 20px; opacity: 1; }
    .toast.error { border-bottom-color: var(--red); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">Scripts<span>FO</span></div>
  <div class="status-wrap">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Conectando...</span>
  </div>
</div>

<div class="app">

  <details class="buscador-wrap" id="buscador-details">
    <summary class="buscador-summary">
      <span>🔍 Buscar SD — <span id="folio-indicator" style="color:var(--accent)">Sin folio activo</span></span>
      <span class="chevron">▼</span>
    </summary>
    <div class="buscador-body">
      <input type="text" id="buscarId" placeholder="Ej. SD-20481">
      <div class="row-btns">
        <button class="btn btn-accent" onclick="buscar()">Buscar</button>
        <button class="btn btn-ghost"  onclick="limpiarSeleccion()">Limpiar</button>
        <button class="btn btn-save"   onclick="guardarRegistro(false)">💾 Guardar</button>
      </div>
      <div class="folios-list" id="lista-folios">
        <span style="color:var(--text3);font-size:11px;">Cargando...</span>
      </div>
    </div>
  </details>

  <div class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab('eta',this)">
      <span class="tab-dot dot-eta"></span>ETA
    </button>
    <button class="tab-btn" onclick="switchTab('sitio',this)">
      <span class="tab-dot dot-sitio"></span>Sitio
    </button>
    <button class="tab-btn" onclick="switchTab('fallo',this)">
      <span class="tab-dot dot-fallo"></span>Fallo
    </button>
    <button class="tab-btn" onclick="switchTab('final',this)">
      <span class="tab-dot dot-final"></span>Final
    </button>
    <button class="tab-btn" onclick="switchTab('preview',this)">
      👁 Preview
    </button>
  </div>

  <div class="panels-wrap">
    <form id="modificar-form">

      <div class="tab-panel active" id="panel-eta">
        <div class="section-title">Script ETA — Inicial</div>
        <div class="field">
          <label>Folio / SD</label>
          <input type="text" id="folio_" name="folio_" placeholder="SD-XXXXX" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>ETA</label>
          <input type="text" id="eta" name="eta" placeholder="Hora estimada de llegada" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Proveedor <span class="sync-tag">auto-sync</span></label>
          <input type="text" id="proveedor" name="proveedor" value="GTB" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Responsable <span class="sync-tag" style="background: var(--purple-dim); color: var(--purple);">solo BD</span></label>
          <select id="responsable" name="responsable">
            <option value="">— Selecciona —</option>
            <option value="Fernando">Fernando</option>
            <option value="Cesar">Cesar</option>
            <option value="Jesus">Jesus</option>
            <option value="Jorge">Jorge</option>
            <option value="Ivan">Ivan</option>
          </select>
        </div>
        <input type="hidden" id="fecha-texto" name="fecha-texto">
      </div>

      <div class="tab-panel" id="panel-sitio">
        <div class="section-title">Script Sitio — Llegada</div>
        <div class="field">
          <label>SD <span class="sync-tag">auto-sync</span></label>
          <input type="text" id="sd" name="sd" readonly>
        </div>
        <div class="field">
          <label>Proveedor <span class="sync-tag">auto-sync</span></label>
          <input type="text" id="proveedor2" name="proveedor2" readonly>
        </div>
        <div class="field">
          <label>Sitio / Punto de medición</label>
          <input type="text" id="punto" name="punto" placeholder="Descripción del punto" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Coordenadas</label>
          <input type="text" id="coordenadas" name="coordenadas" placeholder="Lat, Long" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Distrito <span class="sync-tag">auto-sync</span></label>
          <input type="text" id="distrito" name="distrito" value="JUAREZ" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Nombre del técnico</label>
          <select id="nombre" name="nombre"></select>
        </div>
      </div>

      <div class="tab-panel" id="panel-fallo">
        <div class="section-title">Script Fallo</div>
        <div class="field">
          <label>Folio <span class="sync-tag">auto-sync</span></label>
          <input type="text" id="folio3_" name="folio3_" readonly>
        </div>
        <div class="field">
          <label>ETR</label>
          <input type="text" id="etr" name="etr" placeholder="Tiempo estimado de restauración" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Causa del daño <span class="sync-tag">auto-sync → final</span></label>
          <input type="text" id="causa" name="causa" placeholder="Descripción de la causa" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Acción correctiva</label>
          <input type="text" id="accion" name="accion" placeholder="Acción tomada" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Capacidad de FO</label>
          <input type="text" id="calibre" name="calibre" placeholder="Ej. 12 hilos" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Número QR <span class="sync-tag">auto-sync → final</span></label>
          <input type="text" id="qr" name="qr" placeholder="QR del empalme" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Coordenadas del daño <span class="sync-tag">auto-sync → final</span></label>
          <input type="text" id="coordenadas3" name="coordenadas3" placeholder="Lat, Long" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Materiales a utilizar <span class="sync-tag">auto-sync → final</span></label>
          <input type="text" id="materiales" name="materiales" placeholder="Lista de materiales" onblur="this.value=this.value.trim()">
        </div>
      </div>

      <div class="tab-panel" id="panel-final">
        <div class="section-title">Script Final — Cierre</div>
        <div class="field">
          <label>Folio <span class="sync-tag">auto-sync</span></label>
          <input type="text" id="folio4" name="folio4" readonly>
        </div>
        <div class="field">
          <label>Ciudad <span class="sync-tag">auto-sync</span></label>
          <input type="text" id="ciudad" name="ciudad" readonly>
        </div>
        <div class="field">
          <label>Estado</label>
          <input type="text" id="estado" name="estado" value="CHIHUAHUA" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Fecha del corte</label>
          <input type="date" id="fecha" name="fecha">
        </div>
        <div class="field">
          <label>Cluster</label>
          <select id="cluster" name="cluster">
            <option value="">— Selecciona Cluster —</option>
            <option value="ALDAMA">ALDAMA</option>
            <option value="AMPLIACION ALDAMA">AMPLIACION ALDAMA</option>
            <option value="AMPLIACION ALDAMA 2">AMPLIACION ALDAMA 2</option>
            <option value="AMPLIACION ALDAMA 3">AMPLIACION ALDAMA 3</option>
            <option value="AMPLIACION ALDAMA 4">AMPLIACION ALDAMA 4</option>
            <option value="AMPLIACION ALDAMA 5">AMPLIACION ALDAMA 5</option>
            <option value="BUENOS AIRES">BUENOS AIRES</option>
            <option value="BUENOS AIRES_A">BUENOS AIRES_A</option>
            <option value="BUENOS AIRES 2">BUENOS AIRES 2</option>
            <option value="AMPLIACION BUENOS AIRES">AMPLIACION BUENOS AIRES</option>
            <option value="AMPLIACION BUENOS AIRES_A">AMPLIACION BUENOS AIRES_A</option>
            <option value="AMPLIACION BUENOS AIRES_2_A">AMPLIACION BUENOS AIRES_2_A</option>
            <option value="AMPLIACION BUENOS AIRES_3_A">AMPLIACION BUENOS AIRES_3_A</option>
            <option value="AMPLIACION BUENOS AIRES_4_A">AMPLIACION BUENOS AIRES_4_A</option>
            <option value="AMPLIACION BUENOS AIRES_5_A">AMPLIACION BUENOS AIRES_5_A</option>
            <option value="AMPLIACION BUENOS AIRES_6_A">AMPLIACION BUENOS AIRES_6_A</option>
            <option value="CARLOS AMAYA">CARLOS AMAYA</option>
            <option value="EL VERGEL">EL VERGEL</option>
            <option value="GOMEZ MORIN">GOMEZ MORIN</option>
            <option value="AMPLIACION GOMEZ MORIN">AMPLIACION GOMEZ MORIN</option>
            <option value="LOMAS DE MORELOS">LOMAS DE MORELOS</option>
            <option value="AMPLIACION LOMAS DE MORELOS 2">AMPLIACION LOMAS DE MORELOS 2</option>
            <option value="AMPLIACION LOMAS DE MORELOS 3">AMPLIACION LOMAS DE MORELOS 3</option>
            <option value="LOS CIPRESES">LOS CIPRESES</option>
            <option value="MAYORCA">MAYORCA</option>
            <option value="NOGALES">NOGALES</option>
            <option value="OASIS">OASIS</option>
            <option value="SANTO DOMINGO">SANTO DOMINGO</option>
            <option value="THOMPSON">THOMPSON</option>
            <option value="THOMPSON_A">THOMPSON_A</option>
            <option value="TIERRA NUEVA">TIERRA NUEVA</option>
            <option value="TIERRA NUEVA_A">TIERRA NUEVA_A</option>
            <option value="AMPLIACION TIERRA NUEVA">AMPLIACION TIERRA NUEVA</option>
            <option value="AMPLIACION TIERRA NUEVA 2">AMPLIACION TIERRA NUEVA 2</option>
            <option value="AMPLIACION TIERRA NUEVA 3">AMPLIACION TIERRA NUEVA 3</option>
            <option value="AMPLIACION TIERRA NUEVA 4">AMPLIACION TIERRA NUEVA 4</option>
            <option value="AMPLIACION TIERRA NUEVA 5">AMPLIACION TIERRA NUEVA 5</option>
          </select>
        </div>
        <div class="field">
          <label>OLT</label>
          <select id="olt" name="olt">
            <option value="">Selecciona Cluster primero</option>
          </select>
        </div>
        <div class="field">
          <label>Clientes afectados</label>
          <input type="text" id="clientes" name="clientes" placeholder="Número de clientes" onblur="this.value=this.value.trim()">
        </div>
        <div class="field">
          <label>Falla reportada</label>

// ─── Copiar ────────────────────────────────────────────────
function copiar(id, btn) {
  const txt = document.getElementById(id)?.textContent || '';
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(txt).then(() => {
    btn.innerHTML = '✅'; btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    btn.innerHTML = '✅'; btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1500);
  });
}

async function guardarRegistro(esAutoguardado = false) {
  const folio = g('folio_');
  if (!folio) { if (!esAutoguardado) showToast('Debes ingresar un SD', true); return; }

  const statusText = document.getElementById('status-text');
  const statusDot  = document.getElementById('status-dot');
  if (esAutoguardado) { statusDot.style.background = 'var(--amber)'; statusText.textContent = 'Guardando...'; }

  const data = {
    responsable: g('responsable'), 
    folio, eta: g('eta'), proveedor: g('proveedor'),
    punto: g('punto'), coordenadas: g('coordenadas'),
    distrito: g('distrito'), nombre: g('nombre'),
    causa: g('causa'), accion: g('accion'), etr: g('etr'), calibre: g('calibre'),
    coordenadas3: g('coordenadas3'), qr: g('qr'), materiales: g('materiales'),
    ciudad: g('ciudad'), estado: g('estado'), cluster: g('cluster'), olt: g('olt'),
    clientes: g('clientes'), falla_r: g('falla_r'), fecha: g('fecha-texto'),
    hr_desp: g('hr_desp'), hr_prov: g('hr_prov'), hr_llegada: g('hr_llegada'),
    hr_med: g('hr_med'), ubicacion_1er_2do: g('ubicacion_1er_2do'), qr_2: g('qr_2'),
    causa_dano: g('causa_dano'), ubicacion_dano: g('ubicacion_dano'),
    coordenadas_dano: g('coordenadas_dano'), desc_act: g('desc_act'),
    potencia_inicial: g('potencia_inicial'), potencia_final: g('potencia_final'),
    trabajos_realizados: g('trabajos_realizados'), hr_final: g('hr_final'),
    atiende_nom_tec: g('atiende_nom_tec'), proveedor4: g('proveedor4'),
    supervisor: g('supervisor'), justificacion_sla: g('justificacion_sla'),
    m_pausa: g('m_pausa'), t_pausa: g('t_pausa'), material_utilizado: g('material_utilizado'),
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection("usuarios").doc(folio).set(data);
    const hora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    statusDot.style.background = 'var(--green)';
    statusText.textContent = 'Guardado ' + hora;
    if (!esAutoguardado) showToast('Guardado: ' + folio);
    cargarUltimosFolios();

    // ── NUEVO: registrar en Sheets aunque no haya foto ──
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          folio:       data.folio,
          fecha:       data.fecha,
          distrito:    data.distrito,
          cluster:     data.cluster,
          responsable: data.responsable,
          causa:       data.causa,
          clientes:    data.clientes,
          observacion: data.desc_act,
          soloRegistro: true,
          fileName:    null,
          fileBase64:  null
        })
      });
    } catch(e) { /* silencioso, no bloquea el guardado */ }

  } catch(err) {
    console.error(err);
    statusDot.style.background = 'var(--red)';
    statusText.textContent = 'Error';
    if (!esAutoguardado) showToast('Error al guardar', true);
  }
}

document.getElementById('modificar-form').addEventListener('submit', e => { e.preventDefault(); guardarRegistro(false); });

// ─── Buscar ────────────────────────────────────────────────
async function buscar() {
  const id = document.getElementById("buscarId").value.trim();
  if (!id) { showToast('Ingresa un SD válido', true); return; }
  document.getElementById('galeria-fotos').innerHTML = '';

  try {
    const doc = await db.collection("usuarios").doc(id).get();
    if (!doc.exists) { showToast('SD no encontrado', true); return; }
    const d = doc.data();

    // AGREGADO: responsable incluido en los campos
    const fields = ['folio_','responsable','eta','proveedor','punto','coordenadas','distrito',
      'causa','accion','etr','calibre','coordenadas3','qr','materiales',
      'ciudad','estado','clientes','falla_r','hr_desp','hr_prov',
      'hr_llegada','hr_med','ubicacion_1er_2do','qr_2','causa_dano','ubicacion_dano',
      'coordenadas_dano','desc_act','potencia_inicial','potencia_final','trabajos_realizados',
      'hr_final','atiende_nom_tec','proveedor4','supervisor','justificacion_sla',
      'm_pausa','t_pausa','material_utilizado'];

    fields.forEach(fid => {
      const el = document.getElementById(fid);
      if (el && el.tagName !== 'SELECT') el.value = d[fid === 'folio_' ? 'folio' : fid] || '';
    });

    if (d.fecha) {
      document.getElementById('fecha').value = d.fecha;
      document.getElementById('fecha-texto').value = d.fecha;
    }

    // Asegurarse de seleccionar al responsable
    if (d.responsable) document.getElementById('responsable').value = d.responsable;

    $('#nombre').val(d.nombre || '').trigger('change');

    if (d.cluster) {
      $('#cluster').val(d.cluster).trigger('change');
      llenarOLT();
      setTimeout(() => {
        if (d.olt) document.getElementById('olt').value = d.olt;
        updatePreview();
      }, 150);
    } else {
      updatePreview();
    }

    if (d.fotos && d.fotos.length > 0) d.fotos.forEach(url => mostrarFotoEnGaleria(url));

    // Cerrar acordeón en móvil tras buscar
    document.getElementById('buscador-details').removeAttribute('open');
    showToast('Cargado: ' + id);
  } catch(err) {
    console.error(err);
    showToast('Error al buscar', true);
  }
}

// ─── Limpiar ───────────────────────────────────────────────
function limpiarSeleccion() {
  document.getElementById('buscarId').value = '';
  document.getElementById('modificar-form').reset();
  document.getElementById('galeria-fotos').innerHTML = '';
  document.getElementById('fecha-texto').value = '';
  $('#nombre').val(null).trigger('change');
  $('#cluster').val(null).trigger('change');
  document.getElementById('olt').innerHTML = '<option value="">Selecciona Cluster primero</option>';
  document.getElementById('proveedor').value = 'GTB';
  document.getElementById('distrito').value  = 'JUAREZ';
  document.getElementById('estado').value    = 'CHIHUAHUA';
  updatePreview();
}

// ─── Últimos folios ────────────────────────────────────────
async function cargarUltimosFolios() {
  const lista = document.getElementById("lista-folios");
  lista.innerHTML = '<span style="color:var(--text3);font-size:11px;">Cargando...</span>';
  try {
    const snap = await db.collection("usuarios").orderBy("timestamp","desc").limit(10).get();
    lista.innerHTML = '';
    if (snap.empty) { lista.innerHTML = '<span style="color:var(--text3);font-size:11px;">Sin registros</span>'; return; }
    snap.forEach(doc => {
      const folio = doc.data().folio || doc.id;
      const chip = document.createElement('div');
      chip.className = 'folio-chip';
      chip.innerHTML = `<span class="folio-chip-id">${folio}</span><span class="folio-chip-del">✕</span>`;
      chip.querySelector('.folio-chip-id').onclick = () => {
        document.getElementById('buscarId').value = folio; buscar();
      };
      chip.querySelector('.folio-chip-del').onclick = async e => {
        e.stopPropagation();
        if (!confirm(`¿Eliminar "${folio}"?`)) return;
        try { await db.collection("usuarios").doc(folio).delete(); showToast('Eliminado: ' + folio); cargarUltimosFolios(); }
        catch(err) { showToast('Error al eliminar', true); }
      };
      lista.appendChild(chip);
    });
  } catch(err) { lista.innerHTML = '<span style="color:var(--text3);font-size:11px;">Error al cargar</span>'; }
}

// ─── Autoguardado al salir de clientes ────────────────────
document.getElementById('clientes').addEventListener('change', function() {
  if (this.value.trim()) guardarRegistro(true);
});

// ─── Eventos input ─────────────────────────────────────────
document.querySelectorAll('#modificar-form input, #modificar-form select').forEach(el => {
  el.addEventListener('input', updatePreview);
});

// ─── Drag & Drop fotos (HACIA GOOGLE DRIVE) ────────────────
const dropZone  = document.getElementById('drop-zone');
const inputFotos = document.getElementById('input-fotos');

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxoavHo7-EdKZ53AaY5rlWOhOhSCdRserAGBwlqWyCWYoRQjzlCn1MxJohDf9nTZ2mX/exec";

dropZone.addEventListener('click', () => inputFotos.click());
['dragenter','dragover','dragleave','drop'].forEach(ev =>
  dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); })
);
['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, () => dropZone.classList.add('dragover')));
['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, () => dropZone.classList.remove('dragover')));
dropZone.addEventListener('drop', e => procesarYSubirArchivos(e.dataTransfer.files));
inputFotos.addEventListener('change', function(e) { procesarYSubirArchivos(e.target.files); this.value = ''; });

// Función para convertir la imagen a texto (Base64)
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

async function procesarYSubirArchivos(archivos) {
  const folio = g('folio_');
  if (!folio) { showToast('Ingresa un Folio antes de subir fotos', true); return; }
  const lista = Array.from(archivos || []);
  if (!lista.length) return;

  const statusText = document.getElementById('status-text');
  const statusDot  = document.getElementById('status-dot');
  statusDot.style.background = 'var(--amber)';
  statusText.textContent = `Subiendo ${lista.length} foto(s) a Drive...`;

  try {
    const urlsNuevas = [];

    for (let i = 0; i < lista.length; i++) {
      const archivo = lista[i];
      if (!archivo.type.startsWith('image/')) continue;

      const base64Data = await fileToBase64(archivo);

      // Enviamos todos los datos a Sheets
      const datosParaEnviar = {
        folio: folio,
        fecha: g('fecha'),
        distrito: g('distrito'),
        cluster: g('cluster'),
        responsable: g('responsable'),
        causa: g('causa'),
        clientes: g('clientes'),
        observacion: g('desc_act'),
        fileName: `${Date.now()}_${i}_${archivo.name}`,
        fileBase64: base64Data
      };

      const response = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(datosParaEnviar)
      });

      const resultado = await response.json();

      // Verificación estricta
      if (resultado.exito && resultado.url) {
        urlsNuevas.push(resultado.url);
        mostrarFotoEnGaleria(resultado.url);
      } else {
        console.error("Error en Apps Script:", resultado.error || "URL vacía");
      }
    }

    // 3. Guardar los links de Drive Y TODOS LOS DATOS en tu Firebase Firestore
    if (urlsNuevas.length > 0) {
      
      const dataCompleta = {
        responsable: g('responsable'),
        folio: folio, eta: g('eta'), proveedor: g('proveedor'),
        punto: g('punto'), coordenadas: g('coordenadas'),
        distrito: g('distrito'), nombre: g('nombre'),
        causa: g('causa'), accion: g('accion'), etr: g('etr'), calibre: g('calibre'),
        coordenadas3: g('coordenadas3'), qr: g('qr'), materiales: g('materiales'),
        ciudad: g('ciudad'), estado: g('estado'), cluster: g('cluster'), olt: g('olt'),
        clientes: g('clientes'), falla_r: g('falla_r'), fecha: g('fecha-texto'),
        hr_desp: g('hr_desp'), hr_prov: g('hr_prov'), hr_llegada: g('hr_llegada'),
        hr_med: g('hr_med'), ubicacion_1er_2do: g('ubicacion_1er_2do'), qr_2: g('qr_2'),
        causa_dano: g('causa_dano'), ubicacion_dano: g('ubicacion_dano'),
        coordenadas_dano: g('coordenadas_dano'), desc_act: g('desc_act'),
        potencia_inicial: g('potencia_inicial'), potencia_final: g('potencia_final'),
        trabajos_realizados: g('trabajos_realizados'), hr_final: g('hr_final'),
        atiende_nom_tec: g('atiende_nom_tec'), proveedor4: g('proveedor4'),
        supervisor: g('supervisor'), justificacion_sla: g('justificacion_sla'),
        m_pausa: g('m_pausa'), t_pausa: g('t_pausa'), material_utilizado: g('material_utilizado'),
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        fotos: firebase.firestore.FieldValue.arrayUnion(...urlsNuevas)
      };

      await db.collection("usuarios").doc(folio).set(dataCompleta, { merge: true });
      
      statusDot.style.background = 'var(--green)';
      statusText.textContent = 'Evidencia guardada';
      showToast('Fotos y datos guardados con éxito');
      cargarUltimosFolios(); 
    } else {
      statusDot.style.background = 'var(--red)';
      statusText.textContent = 'Error al subir';
      showToast('No se guardó ninguna foto', true);
    }
  } catch(err) {
    console.error(err);
    statusDot.style.background = 'var(--red)';
    statusText.textContent = 'Error al conectar';
    showToast('Error de comunicación', true);
  }
}

function mostrarFotoEnGaleria(url) {
  const galeria = document.getElementById('galeria-fotos');
  const img = document.createElement('img');
  img.src = url;
  img.onclick = () => window.open(url, '_blank');
  galeria.appendChild(img);
}

// ─── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  cargarUltimosFolios();
  updatePreview();
});
</script>
